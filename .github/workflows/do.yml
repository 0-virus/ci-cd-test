name: Github Actions 을 이용하여 배포하기

on:
  push:
    branches:
      - main

env:
  EC2_HOST: ${{ secrets.EC2.HOST }}
  EC2_USERNAME: ${{ secrets.EC2.USERNAME }}
  EC2_PRIVATE_KEY: ${{ secrets.EC2.PRIVATE_KEY }}
  DEPLOY_PATH: /var/www/html

jobs:
  code-fetch-job:
    runs-on: ubuntu-latest

    steps:
      - name: checkout source
        uses: actions/checkout@v4

      - name: ec2 connect
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: EC2_HOST
          username: EC2_USERNAME
          key: EC2_PRIVATE_KEY
          script: |
            cd /home/ubuntu/cicd_test
            ls -al
